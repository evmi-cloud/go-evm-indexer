apiVersion: 1

# Load every dashboard JSON mounted under /var/lib/grafana/dashboards.
providers:
  - name: EVMI
    orgId: 1
    folder: EVMI
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

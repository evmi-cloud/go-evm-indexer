syntax = "proto3";

package evm_indexer.v1;

option go_package = "github.com/evmi-cloud/go-evm-indexer/gen/evm-indexer/v1;evm_indexer";

message EvmiInstance {
    optional uint32 id = 1;
    string instance_id = 2;
    string ipv4 = 3;
    string status = 4;
    optional uint32 created_at = 5;
    optional uint32 updated_at = 6;
    optional uint32 deleted_at = 7;
}

message EvmBlockchain {
  optional uint32 id = 1;   
  uint64 chain_id = 2;
  string name = 3;
  string rpc_url = 4;
  uint64 block_range = 5;
  uint64 block_slice = 6;
  uint64 pull_interval = 7;
  uint64 rpc_max_batch_size = 8;
  optional uint32 created_at = 9; 
  optional uint32 updated_at = 10; 
  optional uint32 deleted_at = 11; 
}

message EvmJsonAbi {
  optional uint32 id = 1;   
  string contract_name = 2;
  string content = 3;
  optional uint32 created_at = 4; 
  optional uint32 updated_at = 5; 
  optional uint32 deleted_at = 6; 
}

message EvmLogStore {
  optional uint32 id = 1;   
  string identifier = 2;
  string description = 3;
  string store_type = 4;
  string store_config_json = 5;
  optional uint32 created_at = 6; 
  optional uint32 updated_at = 7; 
  optional uint32 deleted_at = 8; 
}

message EvmLogPipeline {
  optional uint32 id = 1;   

  string name = 2;

  uint32 evmi_instance_id = 4;
  uint32 evm_log_store_id = 6;

  optional uint32 created_at = 7; 
  optional uint32 updated_at = 8; 
  optional uint32 deleted_at = 9; 
}

message EvmLogSource {
  optional uint32 id = 1; 

  string type = 2;
  bool enabled = 3;
  string status = 4;

  uint64 start_block = 5;
  uint64 sync_block = 6;

  // Nullable fields
  optional string address = 7;

  optional string topic0 = 8;
  repeated string topic_filters = 9;

  optional int32 factory_child_evm_json_abi = 10;
  optional string factory_creation_function_name =11;
  optional string factory_creation_address_log_arg = 20;

  uint32 evm_log_pipeline_id = 13;
  uint32 evm_json_abi_id = 14;
  uint32 evm_blockchain_id = 15;

  optional uint32 created_at = 16; 
  optional uint32 updated_at = 17; 
  optional uint32 deleted_at = 18; 
}

message EvmMetadata {
    optional string contract_name = 1;
    optional string event_name = 2;
    optional string function_name = 3;
    map<string, string> data = 4;
}

message EvmLog {
  string id = 1;
  uint32 chain_id = 2;
  uint32 source_id = 3;
  string address = 4;
  repeated string topics = 5;
  string data = 6;

  uint64 block_number = 7;
  string transaction_from = 8;
  string transaction_hash = 9;
  uint64 transaction_index = 10;
  string block_hash = 11;
  uint64 log_index = 12;
  bool removed = 13;

  EvmMetadata metadata = 14;
}

message EvmTransaction {
  string id = 1;
  uint32 source_id = 2;
  uint64 block_number = 3;
  uint64 transaction_index = 4;
  uint64 chain_id = 5;
  string from = 6;
  string data = 7;

  string value = 8;

  uint64 nonce = 9;
  string to = 10;
  string hash = 11;

  EvmMetadata metadata = 12;
}

// Pagination
message Pagination {
  uint32 limit = 1;
  uint32 offset = 2;
}

// ==================== CRUD MESSAGES ===================== //

// EvmiInstance
message GetEvmiInstanceRequest {
  uint32 id = 1;
}
message GetEvmiInstanceResponse {
  EvmiInstance instance = 1;
}
message ListEvmiInstancesRequest {
  Pagination pagination = 1;
}
message ListEvmiInstancesResponse {
  repeated EvmiInstance instances = 1;
}

// EvmBlockchain
message CreateEvmBlockchainRequest {
  EvmBlockchain blockchain = 1;
}
message CreateEvmBlockchainResponse {
  uint32 id = 1;
}
message GetEvmBlockchainRequest {
  uint32 id = 1;
}
message GetEvmBlockchainResponse {
  EvmBlockchain blockchain = 1;
}
message UpdateEvmBlockchainRequest {
  EvmBlockchain blockchain = 1;
}
message UpdateEvmBlockchainResponse {
}
message ListEvmBlockchainsRequest {
  Pagination pagination = 1;
}
message ListEvmBlockchainsResponse {
  repeated EvmBlockchain blockchains = 1;
}
message DeleteEvmBlockchainRequest {
  uint32 id = 1;
}
message DeleteEvmBlockchainResponse {
}

// EvmJsonAbi
message CreateEvmJsonAbiRequest {
  EvmJsonAbi abi = 1;
}
message CreateEvmJsonAbiResponse {
  uint32 id = 1;
}
message GetEvmJsonAbiRequest {
  uint32 id = 1;
}
message GetEvmJsonAbiResponse {
  EvmJsonAbi abi = 1;
}
message UpdateEvmJsonAbiRequest {
  EvmJsonAbi abi = 1;
}
message UpdateEvmJsonAbiResponse {
}
message ListEvmJsonAbisRequest {
  Pagination pagination = 1;
}
message ListEvmJsonAbisResponse {
  repeated EvmJsonAbi abis = 1;
}
message DeleteEvmJsonAbiRequest {
  uint32 id = 1;
}
message DeleteEvmJsonAbiResponse {
}

// EvmLogStore
message CreateEvmLogStoreRequest {
  EvmLogStore store = 1;
}
message CreateEvmLogStoreResponse {
  uint32 id = 1;
}
message GetEvmLogStoreRequest {
  uint32 id = 1;
}
message GetEvmLogStoreResponse {
  EvmLogStore store = 1;
}
message UpdateEvmLogStoreRequest {
  EvmLogStore store = 1;
}
message UpdateEvmLogStoreResponse {
}
message ListEvmLogStoresRequest {
  Pagination pagination = 1;
}
message ListEvmLogStoresResponse {
  repeated EvmLogStore stores = 1;
}
message DeleteEvmLogStoreRequest {
  uint32 id = 1;
}
message DeleteEvmLogStoreResponse {
}

// EvmLogPipeline
message CreateEvmLogPipelineRequest {
  EvmLogPipeline pipeline = 1;
}
message CreateEvmLogPipelineResponse {
  uint32 id = 1;
}
message GetEvmLogPipelineRequest {
  uint32 id = 1;
}
message GetEvmLogPipelineResponse {
  EvmLogPipeline pipeline = 1;
}
message UpdateEvmLogPipelineRequest {
  EvmLogPipeline pipeline = 1;
}
message UpdateEvmLogPipelineResponse {
}
message ListEvmLogPipelinesRequest {
  Pagination pagination = 1;
}
message ListEvmLogPipelinesResponse {
  repeated EvmLogPipeline pipelines = 1;
}
message DeleteEvmLogPipelineRequest {
  uint32 id = 1;
}
message DeleteEvmLogPipelineResponse {
}


// EvmLogSource
message CreateEvmLogSourceRequest {
  EvmLogSource source = 1;
}
message CreateEvmLogSourceResponse {
  uint32 id = 1;
}
message GetEvmLogSourceRequest {
  uint32 id = 1;
}
message GetEvmLogSourceResponse {
  EvmLogSource source = 1;
}
message UpdateEvmLogSourceRequest {
  EvmLogSource source = 1;
}
message UpdateEvmLogSourceResponse {
}
message ListEvmLogSourcesRequest {
  Pagination pagination = 1;
  uint32 pipeline_id = 2;
}
message ListEvmLogSourcesResponse {
  repeated EvmLogSource sources = 1;
}
message DeleteEvmLogSourceRequest {
  uint32 id = 1;
}
message DeleteEvmLogSourceResponse {
}

message StreamEvmLogSourceUpdatesRequest {
  // Optional: only stream updates for sources of this pipeline (0 = all).
  uint32 pipeline_id = 1;
}

message StartSourceIndexerRequest {
  uint32 id = 1;
}
message StartSourceIndexerResponse {
  bool success = 1;
  string error = 2;
}
message StopSourceIndexerRequest {
  uint32 id = 1;
}
message StopSourceIndexerResponse {
  bool success = 1;
  string error = 2;
}

// EvmLog
message ListEvmLogsRequest {
  uint32 source_id = 1;
  uint64 from_block = 2;
  uint64 to_block = 3;
}

message ListEvmLogsResponse {
  repeated EvmLog logs = 1;
}

message ListLatestEvmLogsRequest {
  uint32 source_id = 1;
  uint64 limit = 2;
}

message ListLatestEvmLogsResponse {
  repeated EvmLog logs = 1;
}

// EvmTransaction
message ListEvmTransactionsRequest {
  uint32 source_id = 1;
  uint64 from_block = 2;
  uint64 to_block = 3;
}

message ListEvmTransactionsResponse {
  repeated EvmTransaction transactions = 1;
}

// Auth
message AuthUser {
  uint32 id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
}

message AccessTokenInfo {
  uint32 id = 1;
  string name = 2;
  optional int64 created_at = 3;
  optional int64 expires_at = 4;
  optional int64 last_used_at = 5;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}
message LoginResponse {
  string token = 1;
  optional int64 expires_at = 2;
}

message MeRequest {}
message MeResponse {
  AuthUser user = 1;
}

message CreateAccessTokenRequest {
  string name = 1;
  uint32 expires_in_days = 2;
}
message CreateAccessTokenResponse {
  uint32 id = 1;
  string name = 2;
  string token = 3;
  optional int64 expires_at = 4;
}

message ListAccessTokensRequest {}
message ListAccessTokensResponse {
  repeated AccessTokenInfo tokens = 1;
}

message RevokeAccessTokenRequest {
  uint32 id = 1;
}
message RevokeAccessTokenResponse {}

// OAuthProvider. client_secret is never returned; it is set via the separate
// client_secret field on create/update requests (empty on update keeps it).
message OAuthProvider {
  optional uint32 id = 1;
  bool enabled = 2;
  string name = 3;
  string client_id = 4;
  string auth_url = 5;
  string token_url = 6;
  string user_info_url = 7;
  string redirect_url = 8;
  string scopes = 9;
}

message CreateOAuthProviderRequest {
  OAuthProvider provider = 1;
  string client_secret = 2;
}
message CreateOAuthProviderResponse {
  uint32 id = 1;
}
message UpdateOAuthProviderRequest {
  OAuthProvider provider = 1;
  string client_secret = 2;
}
message UpdateOAuthProviderResponse {}
message ListOAuthProvidersRequest {}
message ListOAuthProvidersResponse {
  repeated OAuthProvider providers = 1;
}
message DeleteOAuthProviderRequest {
  uint32 id = 1;
}
message DeleteOAuthProviderResponse {}

// Public: the enabled providers a user can sign in with.
message OAuthLoginOption {
  uint32 provider_id = 1;
  string name = 2;
  string url = 3;
}
message ListOAuthLoginUrlsRequest {}
message ListOAuthLoginUrlsResponse {
  repeated OAuthLoginOption options = 1;
}

// User management (admin).
message ListUsersRequest {}
message ListUsersResponse {
  repeated AuthUser users = 1;
}
message CreateUserRequest {
  string username = 1;
  string password = 2;
  string role = 3;
  string email = 4;
}
message CreateUserResponse {
  uint32 id = 1;
}
message UpdateUserRequest {
  uint32 id = 1;
  string username = 2;
  string role = 3;
  string email = 4;
  // Optional: empty keeps the current password.
  string password = 5;
}
message UpdateUserResponse {}
message DeleteUserRequest {
  uint32 id = 1;
}
message DeleteUserResponse {}

// EvmiExporter
message EvmiExporter {
  optional uint32 id = 1;
  string name = 2;
  uint32 evm_log_pipeline_id = 3;
  bool enabled = 4;
  string status = 5;
  uint64 start_block = 6;
  uint64 sync_block = 7;
  int64 sync_log_index = 8;
  string plugin_config_json = 9;
  uint32 plugin_id = 10;
  optional uint32 created_at = 13;
  optional uint32 updated_at = 14;
  optional uint32 deleted_at = 15;
}

// Plugin
message Plugin {
  optional uint32 id = 1;
  string name = 2;
  string description = 3;
  string git_url = 4;
  string relative_path = 5;
  string local_path = 6;
  string so_path = 7;
  string status = 8;
  string error = 9;
  // Declared config schema (JSON array of {name,type,required,description,default}),
  // extracted from the plugin at install time. Read-only.
  string config_schema_json = 13;
  optional uint32 created_at = 10;
  optional uint32 updated_at = 11;
  optional uint32 deleted_at = 12;
}

message CreatePluginRequest {
  Plugin plugin = 1;
}
message CreatePluginResponse {
  uint32 id = 1;
}
message GetPluginRequest {
  uint32 id = 1;
}
message GetPluginResponse {
  Plugin plugin = 1;
}
message UpdatePluginRequest {
  Plugin plugin = 1;
}
message UpdatePluginResponse {}
message ListPluginsRequest {
  Pagination pagination = 1;
}
message ListPluginsResponse {
  repeated Plugin plugins = 1;
}
message DeletePluginRequest {
  uint32 id = 1;
}
message DeletePluginResponse {}
message InstallPluginRequest {
  uint32 id = 1;
}
message InstallPluginResponse {
  bool success = 1;
  string error = 2;
  string status = 3;
}

message CreateEvmiExporterRequest {
  EvmiExporter exporter = 1;
}
message CreateEvmiExporterResponse {
  uint32 id = 1;
}
message GetEvmiExporterRequest {
  uint32 id = 1;
}
message GetEvmiExporterResponse {
  EvmiExporter exporter = 1;
}
message UpdateEvmiExporterRequest {
  EvmiExporter exporter = 1;
}
message UpdateEvmiExporterResponse {}
message ListEvmiExportersRequest {
  Pagination pagination = 1;
  uint32 pipeline_id = 2;
}
message ListEvmiExportersResponse {
  repeated EvmiExporter exporters = 1;
}
message DeleteEvmiExporterRequest {
  uint32 id = 1;
}
message DeleteEvmiExporterResponse {}
message StartExporterRequest {
  uint32 id = 1;
}
message StartExporterResponse {
  bool success = 1;
  string error = 2;
}
message StopExporterRequest {
  uint32 id = 1;
}
message StopExporterResponse {
  bool success = 1;
  string error = 2;
}

message StreamEvmiExporterUpdatesRequest {
  // Optional: only stream updates for exporters of this pipeline (0 = all).
  uint32 pipeline_id = 1;
}


service EvmIndexerService {
  // EvmiInstance
  rpc GetEvmiInstance(GetEvmiInstanceRequest) returns (GetEvmiInstanceResponse);
  rpc ListEvmiInstances(ListEvmiInstancesRequest) returns (ListEvmiInstancesResponse);

  // EvmBlockchain
  rpc CreateEvmBlockchain(CreateEvmBlockchainRequest) returns (CreateEvmBlockchainResponse);
  rpc GetEvmBlockchain(GetEvmBlockchainRequest) returns (GetEvmBlockchainResponse);
  rpc UpdateEvmBlockchain(UpdateEvmBlockchainRequest) returns (UpdateEvmBlockchainResponse);
  rpc ListEvmBlockchains(ListEvmBlockchainsRequest) returns (ListEvmBlockchainsResponse);
  rpc DeleteEvmBlockchain(DeleteEvmBlockchainRequest) returns (DeleteEvmBlockchainResponse);

  // EvmJsonAbi
  rpc CreateEvmJsonAbi(CreateEvmJsonAbiRequest) returns (CreateEvmJsonAbiResponse);
  rpc GetEvmJsonAbi(GetEvmJsonAbiRequest) returns (GetEvmJsonAbiResponse);
  rpc UpdateEvmJsonAbi(UpdateEvmJsonAbiRequest) returns (UpdateEvmJsonAbiResponse);
  rpc ListEvmJsonAbis(ListEvmJsonAbisRequest) returns (ListEvmJsonAbisResponse);
  rpc DeleteEvmJsonAbi(DeleteEvmJsonAbiRequest) returns (DeleteEvmJsonAbiResponse);

  // EvmLogStore
  rpc CreateEvmLogStore(CreateEvmLogStoreRequest) returns (CreateEvmLogStoreResponse);
  rpc GetEvmLogStore(GetEvmLogStoreRequest) returns (GetEvmLogStoreResponse);
  rpc UpdateEvmLogStore(UpdateEvmLogStoreRequest) returns (UpdateEvmLogStoreResponse);
  rpc ListEvmLogStores(ListEvmLogStoresRequest) returns (ListEvmLogStoresResponse);
  rpc DeleteEvmLogStore(DeleteEvmLogStoreRequest) returns (DeleteEvmLogStoreResponse);

  // EvmLogPipeline
  rpc CreateEvmLogPipeline(CreateEvmLogPipelineRequest) returns (CreateEvmLogPipelineResponse);
  rpc GetEvmLogPipeline(GetEvmLogPipelineRequest) returns (GetEvmLogPipelineResponse);
  rpc UpdateEvmLogPipeline(UpdateEvmLogPipelineRequest) returns (UpdateEvmLogPipelineResponse);
  rpc ListEvmLogPipelines(ListEvmLogPipelinesRequest) returns (ListEvmLogPipelinesResponse);
  rpc DeleteEvmLogPipeline(DeleteEvmLogPipelineRequest) returns (DeleteEvmLogPipelineResponse);
  rpc StartSourceIndexer(StartSourceIndexerRequest) returns (StartSourceIndexerResponse) {}
  rpc StopSourceIndexer(StopSourceIndexerRequest) returns (StopSourceIndexerResponse) {}

  // EvmLogSource
  rpc CreateEvmLogSource(CreateEvmLogSourceRequest) returns (CreateEvmLogSourceResponse);
  rpc GetEvmLogSource(GetEvmLogSourceRequest) returns (GetEvmLogSourceResponse);
  rpc UpdateEvmLogSource(UpdateEvmLogSourceRequest) returns (UpdateEvmLogSourceResponse);
  rpc ListEvmLogSources(ListEvmLogSourcesRequest) returns (ListEvmLogSourcesResponse);
  rpc DeleteEvmLogSource(DeleteEvmLogSourceRequest) returns (DeleteEvmLogSourceResponse);
  // Server stream of live source updates (indexing progress, status changes).
  rpc StreamEvmLogSourceUpdates(StreamEvmLogSourceUpdatesRequest) returns (stream EvmLogSource);

  // EvmLog
  rpc ListEvmLogs(ListEvmLogsRequest) returns (ListEvmLogsResponse);
  rpc ListLatestEvmLogs(ListLatestEvmLogsRequest) returns (ListLatestEvmLogsResponse);

  // EvmTransaction
  rpc ListEvmTransactions(ListEvmTransactionsRequest) returns (ListEvmTransactionsResponse);

  // Auth (Login and GetOAuthLoginUrl are public; all others require a token)
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ListOAuthLoginUrls(ListOAuthLoginUrlsRequest) returns (ListOAuthLoginUrlsResponse);
  rpc Me(MeRequest) returns (MeResponse);
  rpc CreateAccessToken(CreateAccessTokenRequest) returns (CreateAccessTokenResponse);
  rpc ListAccessTokens(ListAccessTokensRequest) returns (ListAccessTokensResponse);
  rpc RevokeAccessToken(RevokeAccessTokenRequest) returns (RevokeAccessTokenResponse);

  // OAuth providers (admin)
  rpc ListOAuthProviders(ListOAuthProvidersRequest) returns (ListOAuthProvidersResponse);
  rpc CreateOAuthProvider(CreateOAuthProviderRequest) returns (CreateOAuthProviderResponse);
  rpc UpdateOAuthProvider(UpdateOAuthProviderRequest) returns (UpdateOAuthProviderResponse);
  rpc DeleteOAuthProvider(DeleteOAuthProviderRequest) returns (DeleteOAuthProviderResponse);

  // Users (admin)
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // EvmiExporter
  rpc CreateEvmiExporter(CreateEvmiExporterRequest) returns (CreateEvmiExporterResponse);
  rpc GetEvmiExporter(GetEvmiExporterRequest) returns (GetEvmiExporterResponse);
  rpc UpdateEvmiExporter(UpdateEvmiExporterRequest) returns (UpdateEvmiExporterResponse);
  rpc ListEvmiExporters(ListEvmiExportersRequest) returns (ListEvmiExportersResponse);
  rpc DeleteEvmiExporter(DeleteEvmiExporterRequest) returns (DeleteEvmiExporterResponse);
  rpc StartExporter(StartExporterRequest) returns (StartExporterResponse);
  rpc StopExporter(StopExporterRequest) returns (StopExporterResponse);
  // Server stream of live exporter updates (sync progress, status changes).
  rpc StreamEvmiExporterUpdates(StreamEvmiExporterUpdatesRequest) returns (stream EvmiExporter);

  // Plugin
  rpc CreatePlugin(CreatePluginRequest) returns (CreatePluginResponse);
  rpc GetPlugin(GetPluginRequest) returns (GetPluginResponse);
  rpc UpdatePlugin(UpdatePluginRequest) returns (UpdatePluginResponse);
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  rpc DeletePlugin(DeletePluginRequest) returns (DeletePluginResponse);
  rpc InstallPlugin(InstallPluginRequest) returns (InstallPluginResponse);
}

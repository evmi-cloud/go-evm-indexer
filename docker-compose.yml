
volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:
  indexer:
    image: evm-indexer:latest
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: "/evm-indexer"
    command: ['start', '-c', '/config.json']
    container_name: indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 8081:8080
    volumes:
      - ./docker/ambiant.config.json:/config.json

  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: evmi
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: evmi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432/tcp"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evmi -d evmi"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_DB: evmi_cloud
      CLICKHOUSE_PASSWORD: secret
    volumes:
      # Store data to HDD
      - ./clickhouse-data:/var/lib/clickhouse/
    ports:
      - "8123:8123/tcp"
      - "9000:9000/tcp"

  ch-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    # Or build locally: build: .
    restart: unless-stopped
    ports:
      - "3488:3488"
    environment:
      # CHANGE THIS in production — encrypts API keys and session credentials.
      APP_SECRET_KEY: ${APP_SECRET_KEY:-please-change-me-to-a-random-secret}
      CLICKHOUSE_URL: http://clickhouse:8123
      CONNECTION_NAME: Local ClickHouse

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
        
  grafana:
    image: grafana/grafana
    ports:
      - 30000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      # Auto-provision the Prometheus datasource + the EVMI dashboard.
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
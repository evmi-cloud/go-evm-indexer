{{- /*
The EVMI config file, shared by all instances and the gateway. Held in a Secret
because database.config.dsn typically carries a password. A checksum annotation on
the pods (below) rolls them when this changes.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "evmi.configSecretName" . }}
  labels:
    {{- include "evmi.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.json: |-
{{ .Values.config | toPrettyJson | indent 4 }}
